<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | CCFD</title>

    <!-- Bootstrap -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            background: radial-gradient(circle at top, #020617, #000);
            color: #e5e7eb;
            font-family: "Roboto", sans-serif;
            padding-top: 85px;
        }

        /* ================= NAVBAR ================= */
        .navbar {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .navbar-brand {
            font-weight: 700;
            color: #111;
        }

        .navbar-toggler {
            border: none;
        }

        .navbar-toggler:focus {
            box-shadow: none;
        }

        /* ================= SIDEBAR ================= */
        .sidebar {
            position: fixed;
            top: 0;
            right: -320px;
            width: 320px;
            height: 100%;
            background: linear-gradient(180deg, #020617, #0f172a);
            padding: 25px;
            transition: 0.35s ease;
            z-index: 1050;
            box-shadow: -15px 0 40px rgba(0,0,0,0.7);
        }

        .sidebar.active {
            right: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #22d3ee;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .sidebar a {
            display: block;
            padding: 14px 12px;
            margin-bottom: 12px;
            color: #e5e7eb;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s;
            font-size: 1.05rem;
        }

        .sidebar a i {
            margin-right: 12px;
            color: #22d3ee;
        }

        .sidebar a:hover {
            background: rgba(34,211,238,0.15);
            transform: translateX(6px);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            color: #22d3ee;
            cursor: pointer;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            z-index: 1040;
        }

        .overlay.active {
            display: block;
        }

        /* ================= CARD ================= */
        .card {
            background: linear-gradient(145deg, #0b1220, #020617);
            border: 1px solid #1e293b;
            border-radius: 18px;
        }

        .card-header {
            background: linear-gradient(90deg, #2563eb, #22d3ee);
            color: white;
            font-weight: 600;
            border-radius: 18px 18px 0 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            cursor: pointer;
            font-weight: 600;
        }

        .back-btn:hover {
            transform: translateX(-3px);
        }

        /* ================= PROFILE IMAGE ================= */
        .profile-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            background:
                linear-gradient(#020617, #020617) padding-box,
                linear-gradient(135deg, #2563eb, #22d3ee) border-box;
            border: 4px solid transparent;
            box-shadow: 0 0 30px rgba(34,211,238,0.4);
        }

        .upload-btn {
            margin-top: 12px;
            color: #22d3ee;
            font-weight: 600;
            cursor: pointer;
        }

        .upload-btn:hover {
            color: #38bdf8;
        }

        /* ================= FORM ================= */
        label {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .form-control {
            background: linear-gradient(145deg, #0b1220, #020617);
            border: 1px solid #1e293b;
            color: #e5e7eb;
            border-radius: 10px;
            height: 46px;
        }

        .form-control:focus {
            border-color: #22d3ee;
            box-shadow: 0 0 0 2px rgba(34,211,238,0.25);
        }

        .btn-primary {
            background: linear-gradient(90deg, #2563eb, #22d3ee);
            border: none;
            padding: 12px 40px;
            border-radius: 30px;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(37,99,235,0.35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        @media (max-width: 576px) {
            .profile-photo {
                width: 120px;
                height: 120px;
            }
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar fixed-top">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand">Credit Card Fraud Detection</a>
        <button class="btn" onclick="openSidebar()">
            <i class="fa fa-bars fa-lg"></i>
        </button>
    </div>
</nav>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <div class="sidebar-header">
        {{ username }}
        <button class="close-btn" onclick="closeSidebar()">&times;</button>
    </div>

    <a href="/home"><i class="fa fa-home"></i> Home</a>
    <a href="/admin"><i class="fa fa-brain"></i> Model</a>
    <a href="/profile"><i class="fa fa-user"></i> Profile</a>
</div>

<div id="overlay" class="overlay" onclick="closeSidebar()"></div>

<!-- PROFILE -->
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-9 col-xl-8">

            <div class="card">
                <div class="card-header">
                    <span class="back-btn" onclick="history.back()">
                        <i class="fa fa-arrow-left"></i> Back
                    </span>
                    <span>Account Details</span>
                </div>

                <div class="card-body px-4 py-4">

                    <!-- PHOTO -->
                    <div class="text-center mb-4">
                        <img id="profilePreview"
                             src="https://ui-avatars.com/api/?name={{ username }}&background=2563eb&color=fff&size=256"
                             class="profile-photo">
                        <div>
                            <label class="upload-btn">
                                <i class="fa fa-camera"></i> Change Photo
                                <input type="file" hidden accept="image/*" onchange="previewPhoto(event)">
                            </label>
                        </div>
                    </div>

                    <!-- FORM -->
                    <form method="POST" action="/profile/update">

                        <div class="mb-3">
                            <label>Username</label>
                            <input class="form-control" value="{{ username }}" readonly>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label>First Name</label>
                                <input class="form-control" name="first_name" value="{{ user_data.first_name if user_data }}">
                            </div>
                            <div class="col-md-6">
                                <label>Last Name</label>
                                <input class="form-control" name="last_name" value="{{ user_data.last_name if user_data }}">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label>Organization</label>
                                <input class="form-control" name="organization_name" value="{{ user_data.organization_name if user_data }}">
                            </div>
                            <div class="col-md-6">
                                <label>Location</label>
                                <input class="form-control" name="location" value="{{ user_data.location if user_data }}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            <input class="form-control" value="{{ user_data.email if user_data }}" readonly>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label>Phone</label>
                                <input class="form-control" name="phone_number" value="{{ user_data.phone_number if user_data }}">
                            </div>
                            <div class="col-md-6">
                                <label>Birthday</label>
                                <input type="date" class="form-control" name="birthday" value="{{ user_data.birthday if user_data }}">
                            </div>
                        </div>

                        <div class="text-center">
                            <button class="btn btn-primary">Save Changes</button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<script>
    function openSidebar() {
        document.getElementById("sidebar").classList.add("active");
        document.getElementById("overlay").classList.add("active");
    }
    function closeSidebar() {
        document.getElementById("sidebar").classList.remove("active");
        document.getElementById("overlay").classList.remove("active");
    }
    function previewPhoto(event) {
        const reader = new FileReader();
        reader.onload = () => document.getElementById("profilePreview").src = reader.result;
        reader.readAsDataURL(event.target.files[0]);
    }
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
